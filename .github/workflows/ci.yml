name: Guest Management Service CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  build-and-test:
    name: Restore, build, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Add GitHub Packages source
        run: dotnet nuget add source "https://nuget.pkg.github.com/My-Learning-Corner-MLC/index.json" --name github --username "${{ github.actor }}" --password "${{ secrets.GH_PACKAGES_TOKEN }}" --store-password-in-clear-text

      - name: Restore
        run: dotnet restore GuestManagementService.sln

      - name: Build
        run: dotnet build GuestManagementService.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test GuestManagementService.sln --configuration Release --no-build /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:CoverletOutput=${{ github.workspace }}/TestResults/coverage.cobertura.xml

      - name: Diff coverage (changed lines only, fail under 50%)
        if: github.event_name == 'pull_request'
        run: |
          pipx install diff-cover
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1
          diff-cover "${{ github.workspace }}/TestResults/coverage.cobertura.xml" \
            --compare-branch="origin/${{ github.event.pull_request.base.ref }}" \
            --fail-under=50
