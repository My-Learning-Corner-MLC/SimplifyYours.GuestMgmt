name: Guest Management Service CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  build-and-test:
    name: Restore, build, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Add GitHub Packages source
        run: dotnet nuget add source "https://nuget.pkg.github.com/My-Learning-Corner-MLC/index.json" --name github --username "${{ github.actor }}" --password "${{ secrets.GH_PACKAGES_TOKEN }}" --store-password-in-clear-text

      - name: Restore
        run: dotnet restore GuestManagementService.sln

      - name: Build
        run: dotnet build GuestManagementService.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test GuestManagementService.sln --configuration Release --no-build /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:Threshold=80 /p:ThresholdType=line /p:ThresholdStat=total
